name: 🎭 E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC

env:
  NODE_VERSION: '18'

jobs:
  # Job 1: Playwright E2E Tests
  e2e-tests:
    name: 🎭 Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔧 Install Playwright browsers
        run: npx playwright install --with-deps

      - name: 🏗️ Build application
        run: npm run build

      - name: 🎭 Run Playwright tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000

      - name: 📊 Upload Playwright report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # Job 2: Critical User Flows
  critical-flows:
    name: 🔴 Critical User Flows
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔧 Install Playwright browsers
        run: npx playwright install --with-deps

      - name: 🏗️ Build application
        run: npm run build

      - name: 🔴 Run critical flow tests
        run: npm run test:e2e:critical
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000

      - name: 📤 Upload critical flow results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: critical-flows-report
          path: test-results/
          retention-days: 7

  # Job 3: Performance Testing
  performance:
    name: ⚡ Performance Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏗️ Build application
        run: npm run build

      - name: ⚡ Run performance tests
        run: npm run test:performance

      - name: 📊 Upload performance results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-results
          path: performance-results/
          retention-days: 30

  # Job 4: Visual Regression Testing
  visual-regression:
    name: 👁️ Visual Regression Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔧 Install Playwright browsers
        run: npx playwright install --with-deps

      - name: 🏗️ Build application
        run: npm run build

      - name: 👁️ Run visual regression tests
        run: npm run test:visual

      - name: 📤 Upload visual diff reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: visual-regression-report
          path: visual-regression-results/
          retention-days: 30

  # Final status
  e2e-status:
    name: ✅ E2E Status
    runs-on: ubuntu-latest
    needs: [e2e-tests, critical-flows, performance, visual-regression]
    if: always()
    steps:
      - name: 📋 Check E2E Status
        run: |
          if [ "${{ needs.e2e-tests.result }}" != "success" ] || \
             [ "${{ needs.critical-flows.result }}" != "success" ]; then
            echo "❌ Critical E2E Tests Failed"
            exit 1
          fi
          echo "✅ All E2E Tests Passed"

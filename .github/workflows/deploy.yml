name: Deploy to Vercel

# Auto-deploy on push to main, plus manual trigger for preview deploys.
#
# Required GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#   VERCEL_TOKEN      -- Personal token from vercel.com/account/tokens
#   VERCEL_ORG_ID     -- team_n2NbVcRR68n7epCLuyZc1M2f
#   VERCEL_PROJECT_ID -- prj_sfSVMs2tubUghQTUn0t9u0ZmVUQS
#
# All runtime env vars (DATABASE_URL, STRIPE_*, GLM_*, EMAIL_*, etc.)
# must be configured in the Vercel project dashboard:
#   vercel.com -> yanhaoau-1392s-projects -> silverconnect -> Settings -> Environment Variables.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link Vercel project
        run: vercel link --yes --project=silverconnect --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.target }}" = "production" ]; then
            vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
          else
            vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --yes
          fi

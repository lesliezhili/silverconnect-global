name: Deploy to Vercel

# Auto-deploy on push to main, plus manual trigger for preview deploys.
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       — Personal token from vercel.com/account/tokens
#   VERCEL_ORG_ID      — team_V0iunB5JnKuPRw80UkiSNxFc
#   VERCEL_PROJECT_ID  — prj_mfwDqQusJ1UnEWr6ppat0yEv7Rwh
#
# All runtime env vars (DATABASE_URL, STRIPE_*, GLM_*, EMAIL_*, etc.)
# must be configured in the Vercel project dashboard:
#   vercel.com → silverconnect-global → Settings → Environment Variables.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Determine target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=production" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull Vercel environment
        run: |
          vercel pull --yes \
            --environment=${{ steps.target.outputs.name }} \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: |
          if [ "${{ steps.target.outputs.name }}" = "production" ]; then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: Deploy
        run: |
          if [ "${{ steps.target.outputs.name }}" = "production" ]; then
            vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
          fi

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: silverconnect-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-silverconnect}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./lib/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - silverconnect

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: silverconnect-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - silverconnect

  # Mailhog (Email Testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: silverconnect-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - silverconnect

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: silverconnect-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-silverconnect}
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      EMAIL_HOST: mailhog
      EMAIL_PORT: 1025
      EMAIL_USER: ${EMAIL_USER:-test}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-test}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - silverconnect
    command: npm run dev

  # Adminer (Database UI)
  adminer:
    image: adminer:latest
    container_name: silverconnect-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - silverconnect

  # Redis Commander (Redis UI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: silverconnect-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - silverconnect

volumes:
  postgres-data:
  redis-data:

networks:
  silverconnect:
    driver: bridge
